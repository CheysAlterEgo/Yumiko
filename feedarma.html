<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feed Arma</title>

<style>
body{
margin:0;
background:#EEEEEE;
font-family:"Courier New", monospace;
overflow:hidden;
}

/* BORDER FRAME */
body::before{
content:"";
position:fixed;
top:10px; left:10px; right:10px; bottom:10px;
border:6px solid #ffb6e6;
border-radius:20px;
pointer-events:none;
}

/* TEXT */
.text{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:26px;
font-weight:bold;
animation:pulse 1.2s infinite;
}
@keyframes pulse{
50%{transform:scale(1.05);}
}

.pink{color:#ff6ec7;}
.teal{color:#00cfcf;}

/* ARMA */
#armaContainer{
position:absolute;
bottom:40px;
left:40px;
text-align:center;
}
#arma{
width:140px;
}

/* COOKIE COUNTER (COOKIE STYLE) */
#counterBox{
position:absolute;
bottom:200px;
left:30px;
background:#d9a066;
border:4px solid #7a4a1c;
border-radius:50px;
padding:10px 20px;
font-weight:bold;
}

/* YUMIKO */
#yumikoContainer{
position:absolute;
bottom:40px;
right:40px;
}
#yumiko{
width:140px;
}

/* JAR */
#jar{
position:absolute;
top:40px;
right:60px;
width:150px;
cursor:pointer;
}

/* COOKIE */
#cookie{
position:absolute;
width:80px;
display:none;
pointer-events:none;
z-index:999;
}

/* RUNNING IMAGE */
#runner{
position:absolute;
width:140px;
display:none;
pointer-events:none;
z-index:998;
}

/* INTRO */
#intro{
position:fixed;
top:0; left:0;
width:100%; height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.5);
}
#introBox{
background:linear-gradient(#ffd6f5,#c6f0ff);
border:5px solid #ff6ec7;
border-radius:15px;
padding:30px;
text-align:center;
box-shadow:0 0 20px pink;
}

/* VEX */
#vex{
position:absolute;
top:120px;
width:100%;
text-align:center;
display:none;
}
#vex img{
width:300px;
margin-top:40px;
}

/* GAME OVER */
#gameOver{
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:black;
color:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}
</style>
</head>

<body>

<div id="text" class="text pink">Give Arma a cookie!</div>

<!-- INTRO -->
<div id="intro">
<div id="introBox">
<h2>Haiii ⸜(｡˃ ᵕ ˂ )⸝♡ </h2>
<p>Shhh… don’t wake up Vex…<br>feed Arma cookies okay!!</p>
<button onclick="startGame()">OKAY!</button>
</div>
</div>

<!-- COOKIE COUNTER -->
<div id="counterBox">🍪 <span id="counter">0</span></div>

<!-- ARMA -->
<div id="armaContainer">
<img id="arma" src="arma1.jpg">
</div>

<!-- YUMIKO -->
<div id="yumikoContainer">
<video id="yumiko" autoplay muted loop></video>
</div>

<!-- COOKIE JAR -->
<img id="jar" src="cookiejar.PNG">

<!-- COOKIE -->
<img id="cookie" src="cookie.PNG">

<!-- RUNNER TEST -->
<img id="runner" src="deviorandkairo.PNG">

<!-- VEX -->
<div id="vex">
<div class="text teal">DON'T MOVE</div>
<img src="vex.PNG">
</div>

<!-- GAME OVER -->
<div id="gameOver">
<h1>Vex Got You  \(˚☐˚”)/  </h1>
<img src="gameover.jpg" width="260">
<button onclick="location.reload()">Play Again ദ്ദി( •̀ ᴗ - ˵ ) </button>
</div>

<script>
let cookie=document.getElementById("cookie");
let jar=document.getElementById("jar");
let yumiko=document.getElementById("yumiko");
let arma=document.getElementById("arma");
let counter=document.getElementById("counter");
let text=document.getElementById("text");
let vex=document.getElementById("vex");
let runner=document.getElementById("runner");

let cookieActive=false;
let runnerActive=false;
let vexActive=false;
let score=0;

let idols=["idol1.mov","idol2.mov","idol3.mov"];

function randomIdol(){
yumiko.src=idols[Math.floor(Math.random()*3)];
yumiko.load();
yumiko.play();
}

function startGame(){
document.getElementById("intro").style.display="none";
randomIdol();
startVexLoop();
}

/* COOKIE CLICK */
jar.onclick=()=>{
cookieActive=true;
cookie.style.display="block";
};

/* MOUSE */
document.onmousemove=(e)=>{

if(vexActive){
gameOver();
return;
}

/* COOKIE */
if(cookieActive && !runnerActive){
cookie.style.left=(e.pageX-40)+"px";
cookie.style.top=(e.pageY-40)+"px";

if(hit(cookie,yumiko)){
startRun(e);
}
}

/* RUNNER */
if(runnerActive){
runner.style.left=(e.pageX-70)+"px";
runner.style.top=(e.pageY-70)+"px";

if(hit(runner,arma)){
success();
}
}
};

/* START RUN */
function startRun(e){
cookieActive=false;
cookie.style.display="none";

runnerActive=true;
runner.style.display="block";

text.innerText="RUNNN";

/* spawn runner at cursor */
runner.style.left=(e.pageX-70)+"px";
runner.style.top=(e.pageY-70)+"px";
}

/* SUCCESS */
function success(){
runnerActive=false;
runner.style.display="none";

score++;
counter.innerText=score;

arma.src="arma3.jpg";
text.innerText="YAYYY";

setTimeout(()=>{
arma.src="arma1.jpg";
randomIdol();
text.innerText="Give Arma a cookie!";
},1500);
}

function hit(a,b){
let r1=a.getBoundingClientRect();
let r2=b.getBoundingClientRect();
return !(r2.left>r1.right||r2.right<r1.left||r2.top>r1.bottom||r2.bottom<r1.top);
}

/* VEX SYSTEM */
function startVexLoop(){
setInterval(()=>{

text.innerText="Vex is waking up...";
text.className="text teal";

setTimeout(()=>{
vex.style.display="block";
vexActive=true;
},5000);

setTimeout(()=>{
vex.style.display="none";
vexActive=false;
text.innerText="Give Arma a cookie!";
text.className="text pink";
},25000);

},30000);
}

function gameOver(){
document.getElementById("gameOver").style.display="flex";
}
</script>

</body>
</html>
