<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Arma Game</title>

<style>
body {
margin:0;
background:#EEEEEE;
font-family:"Courier New", monospace;
overflow:hidden;
}

/* animated top text */
.text {
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
pointer-events:none;
animation:pulse 1.2s infinite;
}

@keyframes pulse {
0% { transform:scale(1); opacity:1; }
50% { transform:scale(1.05); opacity:0.7; }
100% { transform:scale(1); opacity:1; }
}

.pink { color:#ff6ec7; }
.teal { color:#00cfcf; }

#armaContainer {
position:absolute;
bottom:40px;
left:40px;
text-align:center;
z-index:2;
}

#yumikoContainer {
position:absolute;
bottom:40px;
right:40px;
z-index:2;
}

#yumiko {
width:150px;
}

#jar {
position:absolute;
top:40px;
right:80px;
width:120px;
cursor:grab;
z-index:3;
}

#cookie {
position:absolute;
width:80px;
display:none;
pointer-events:none;
z-index:999;
}

#vexWarning {
position:absolute;
top:40px;
width:100%;
text-align:center;
display:none;
z-index:10;
}

#vexWarning img {
width:220px;   /* bigger */
margin-top:20px; /* lower visually */
}

#gameOver {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

button {
padding:10px 20px;
margin-top:20px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="text" class="text pink">Give Arma a cookie!</div>

<!-- ARMA -->
<div id="armaContainer">
<div>Cookies: <span id="counter">0</span></div>
<img id="arma" src="arma1.jpg">
</div>

<!-- YUMIKO -->
<div id="yumikoContainer">
<video id="yumiko" autoplay muted loop playsinline></video>
</div>

<!-- COOKIE JAR -->
<img id="jar" src="cookiejar.PNG">

<!-- COOKIE -->
<img id="cookie" src="cookie.PNG">

<!-- VEX -->
<div id="vexWarning">
<div class="text teal">Vex is waking up, don't move</div>
<img src="vex.PNG">
</div>

<!-- GAME OVER -->
<div id="gameOver">
<h1>Vex got you</h1>
<img src="gameover.jpg" style="width:200px;">
<button onclick="restart()">Play Again</button>
</div>

<script>
let cookie = document.getElementById("cookie");
let jar = document.getElementById("jar");
let yumiko = document.getElementById("yumiko");
let arma = document.getElementById("arma");
let counter = document.getElementById("counter");
let text = document.getElementById("text");
let vexBox = document.getElementById("vexWarning");

let dragging = false;
let runnerMode = false;
let vexActive = false;
let score = 0;

let idols = ["idol1.mov","idol2.mov","idol3.mov"];

/* FIX: video actually loads */
function randomIdol(){
yumiko.src = idols[Math.floor(Math.random()*idols.length)];
yumiko.load();
yumiko.play().catch(()=>{});
}
randomIdol();

/* START MESSAGE */
setTimeout(()=>{
alert("Haiii shhh be quiet dont wake up Vex, help me feed Arma okay!!");
},200);

/* FIXED DRAG SYSTEM */
jar.onmousedown = (e) => {
dragging = true;
cookie.style.display = "block";

/* spawn cookie at jar */
cookie.style.left = jar.offsetLeft + "px";
cookie.style.top = jar.offsetTop + "px";
};

document.onmouseup = () => dragging = false;

document.onmousemove = (e) => {

if(vexActive){
gameOver();
return;
}

/* COOKIE DRAG */
if(dragging && !runnerMode){
cookie.style.left = (e.pageX - 40) + "px";
cookie.style.top = (e.pageY - 40) + "px";

let yRect = yumiko.getBoundingClientRect();
let cRect = cookie.getBoundingClientRect();

if(intersect(cRect, yRect)){
startRun();
}
}

/* RUN MODE */
if(runnerMode){
yumiko.style.position = "absolute";
yumiko.style.left = e.pageX + "px";
yumiko.style.top = e.pageY + "px";

let aRect = arma.getBoundingClientRect();
let yRect = yumiko.getBoundingClientRect();

if(intersect(aRect,yRect)){
success();
}
}
};

function startRun(){
runnerMode = true;
cookie.style.display = "none";

text.innerText = "RUNNN";
text.className = "text pink";

yumiko.src = "yumirunning.mov";
yumiko.load();
yumiko.play();
}

function success(){
runnerMode = false;
score++;
counter.innerText = score;

arma.src = "arma3.jpg";

text.innerText = "Congratulations!";

setTimeout(()=>{
arma.src = "arma1.jpg";
yumiko.style.position = "static";
randomIdol();
text.innerText = "Give Arma a cookie!";
},1500);
}

function intersect(r1, r2){
return !(
r2.left > r1.right ||
r2.right < r1.left ||
r2.top > r1.bottom ||
r2.bottom < r1.top
);
}

/* VEX FIX */
function triggerVex(){
vexActive = true;
vexBox.style.display = "block";
text.innerText = "Vex is waking up...";
text.className = "text teal";

setTimeout(()=>{
vexActive = false;
vexBox.style.display = "none";
text.innerText = "Give Arma a cookie!";
text.className = "text pink";
},20000);
}

setInterval(triggerVex, 30000);

function gameOver(){
document.getElementById("gameOver").style.display = "flex";
}

function restart(){
location.reload();
}
</script>

</body>
</html>
