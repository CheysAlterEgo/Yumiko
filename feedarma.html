<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feed Arma</title>

<!-- PIXEL FONT -->


<style>
body{
margin:0;
background:#EEEEEE;
font-family:'Press Start 2P', monospace;
overflow:hidden;
}

/* BORDER */
body::before{
content:"";
position:fixed;
top:10px; left:10px; right:10px; bottom:10px;
border:6px solid #ffb6e6;
border-radius:20px;
pointer-events:none;
transition:0.3s;
}

/* 🌈 RAINBOW BORDER */
.rainbow::before{
animation:rainbowBorder 1s linear infinite;
}

@keyframes rainbowBorder{
0%{border-color:red;}
20%{border-color:orange;}
40%{border-color:yellow;}
60%{border-color:lime;}
80%{border-color:cyan;}
100%{border-color:magenta;}
}

/* TEXT */
.text{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:16px;
animation:pulse 1.2s infinite;
}
@keyframes pulse{50%{transform:scale(1.05);} }

.pink{color:#ff6ec7;}
.teal{color:#00cfcf;}

/* 🫨 SHAKE */
.shake{
animation:shake 0.15s infinite;
}
@keyframes shake{
0%{transform:translate(2px,2px);}
50%{transform:translate(-2px,-2px);}
100%{transform:translate(2px,-2px);}
}

/* ARMA */
#armaContainer{
position:absolute;
bottom:40px;
left:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

#arma{
width:260px;
}

/* COOKIE COUNTER */
#counterBox{
background:#d9a066;
border:4px solid #7a4a1c;
border-radius:50px;
padding:10px 20px;
font-size:12px;
}

/* YUMIKO */
#yumikoContainer{
position:absolute;
bottom:40px;
right:40px;
}
#yumiko{
width:260px;
}

/* JAR */
#jar{
position:absolute;
top:40px;
right:60px;
width:170px;
cursor:pointer;
}

/* COOKIE */
#cookie{
position:absolute;
width:90px;
display:none;
pointer-events:none;
z-index:999;
}

/* RUNNER */
#runner{
position:absolute;
width:260px;
display:none;
pointer-events:none;
z-index:998;
}

/* INTRO */
#intro{
position:fixed;
top:0; left:0;
width:100%; height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.5);
}
#introBox{
background:linear-gradient(#ffd6f5,#c6f0ff);
border:5px solid #ff6ec7;
border-radius:15px;
padding:30px;
text-align:center;
box-shadow:0 0 20px pink;
}

/* VEX */
#vex{
position:absolute;
top:140px;
width:100%;
text-align:center;
display:none;
}
#vex img{
width:340px;
margin-top:60px;
}

/* GAME OVER */
#gameOver{
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:black;
color:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
gap:30px;
}
</style>
</head>

<body>

<div id="text" class="text pink">Give Arma a cookie!</div>

<!-- INTRO -->
<div id="intro">
<div id="introBox">
<h2>Haiii ⸜(｡˃ ᵕ ˂ )⸝♡</h2>
<p>Shhh… don’t wake up Vex…<br>feed Arma cookies okay!!</p>
<button onclick="startGame()">OKAY!</button>
</div>
</div>

<!-- ARMA -->
<div id="armaContainer">
<div id="counterBox">🍪 <span id="counter">0</span></div>
<img id="arma" src="arma1.jpg">
</div>

<!-- YUMIKO -->
<div id="yumikoContainer">
<video id="yumiko" autoplay muted loop playsinline></video>
</div>

<!-- COOKIE JAR -->
<img id="jar" src="cookiejar.PNG">

<!-- COOKIE -->
<img id="cookie" src="cookie.PNG">

<!-- RUNNER VIDEO -->
<video id="runner" muted playsinline loop>
<source src="yumirunning.mov" type="video/mp4">
</video>

<!-- VEX -->
<div id="vex">
<div class="text teal">DON'T MOVE</div>
<img src="vex.PNG">
</div>

<!-- GAME OVER -->
<div id="gameOver">
<h1>Vex Got You \(˚☐˚”)/</h1>
<img src="gameover.jpg" width="300">
<button onclick="location.reload()">Play Again ദ്ദി( •̀ ᴗ - ˵ )</button>
</div>

<script>
let cookie=document.getElementById("cookie");
let jar=document.getElementById("jar");
let yumiko=document.getElementById("yumiko");
let arma=document.getElementById("arma");
let counter=document.getElementById("counter");
let text=document.getElementById("text");
let vex=document.getElementById("vex");
let runner=document.getElementById("runner");

let cookieActive=false;
let runnerActive=false;
let vexActive=false;
let score=0;

let idols=["idol1.mov","idol2.mov","idol3.mov"];

function randomIdol(){
yumiko.src=idols[Math.floor(Math.random()*3)];
yumiko.load();
yumiko.play();
}

function startGame(){
document.getElementById("intro").style.display="none";
randomIdol();
startVexLoop();
}

/* COOKIE */
jar.onclick=()=>{
cookieActive=true;
cookie.style.display="block";
};

document.onmousemove=(e)=>{

if(vexActive){
gameOver();
return;
}

if(cookieActive && !runnerActive){
cookie.style.left=(e.pageX-45)+"px";
cookie.style.top=(e.pageY-45)+"px";

if(hit(cookie,yumiko)){
startRun(e);
}
}

if(runnerActive){
runner.style.left=(e.pageX-130)+"px";
runner.style.top=(e.pageY-130)+"px";

if(hit(runner,arma)){
success();
}
}
};

/* START RUN */
function startRun(e){
cookieActive=false;
cookie.style.display="none";

yumiko.style.display="none";

runnerActive=true;
runner.style.display="block";

runner.currentTime=0;
runner.play();

text.innerText="RUNNN";

runner.style.left=(e.pageX-130)+"px";
runner.style.top=(e.pageY-130)+"px";
}

/* SUCCESS (🌈 CLEAN VERSION) */
function success(){
runnerActive=false;
runner.style.display="none";
runner.pause();

/* KEEP YUMIKO HIDDEN */

score++;
counter.innerText=score;

arma.src="arma3.jpg";
text.innerText="YAYYY!!!";

/* 🌈 rainbow border */
document.body.classList.add("rainbow");

setTimeout(()=>{
document.body.classList.remove("rainbow");

/* restore AFTER animation */
yumiko.style.display="block";
arma.src="arma1.jpg";
randomIdol();

text.innerText="Give Arma a cookie!";
},2000);
}

function hit(a,b){
let r1=a.getBoundingClientRect();
let r2=b.getBoundingClientRect();
return !(r2.left>r1.right||r2.right<r1.left||r2.top>r1.bottom||r2.bottom<r1.top);
}

/* VEX */
function startVexLoop(){
setInterval(()=>{

text.innerText="Vex is waking up...";
text.className="text teal";

setTimeout(()=>{
vex.style.display="block";
vexActive=true;

/* SHAKE ON */
document.body.classList.add("shake");

},5000);

setTimeout(()=>{
vex.style.display="none";
vexActive=false;

/* SHAKE OFF */
document.body.classList.remove("shake");

text.innerText="Give Arma a cookie!";
text.className="text pink";
},25000);

},30000);
}

function gameOver(){
document.getElementById("gameOver").style.display="flex";
}
</script>

</body>
</html>
