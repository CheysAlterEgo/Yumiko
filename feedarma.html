<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feed Arma</title>

<style>
body{
margin:0;
background:#EEEEEE;
font-family:"Courier New", monospace;
overflow:hidden;
}

/* TEXT */
.text{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:26px;
font-weight:bold;
pointer-events:none;
animation:pulse 1.2s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.pink{color:#ff6ec7;}
.teal{color:#00cfcf;}

/* ARMA */
#armaContainer{
position:absolute;
bottom:40px;
left:40px;
text-align:center;
}
#arma{
width:120px; /* FIXED SIZE */
}

/* YUMIKO */
#yumikoContainer{
position:absolute;
bottom:40px;
right:40px;
}
#yumiko{
width:140px;
}

/* JAR */
#jar{
position:absolute;
top:40px;
right:80px;
width:110px;
cursor:pointer;
}

/* COOKIE */
#cookie{
position:absolute;
width:70px;
display:none;
pointer-events:none;
z-index:999;
}

/* INTRO BOX */
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.4);
z-index:9999;
}
#introBox{
background:#ffd6f5;
padding:30px;
border:4px solid #ff6ec7;
border-radius:10px;
text-align:center;
}
#intro button{
margin-top:10px;
padding:10px;
font-size:16px;
cursor:pointer;
}

/* VEX */
#vex{
position:absolute;
top:80px;
width:100%;
text-align:center;
display:none;
}
#vex img{
width:250px;
}

/* GAME OVER */
#gameOver{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}
</style>
</head>

<body>

<div id="text" class="text pink">Give Arma a cookie!</div>

<!-- INTRO -->
<div id="intro">
<div id="introBox">
<h2>Haiii 😭</h2>
<p>shhh be quiet… don’t wake up Vex…<br>help me feed Arma okay!!</p>
<button onclick="startGame()">OKAY!</button>
</div>
</div>

<!-- ARMA -->
<div id="armaContainer">
<div>Cookies: <span id="counter">0</span></div>
<img id="arma" src="arma1.jpg">
</div>

<!-- YUMIKO -->
<div id="yumikoContainer">
<video id="yumiko" autoplay muted loop></video>
</div>

<!-- JAR -->
<img id="jar" src="cookiejar.PNG">

<!-- COOKIE -->
<img id="cookie" src="cookie.PNG">

<!-- VEX -->
<div id="vex">
<div class="text teal" id="vexText"></div>
<img src="vex.PNG">
</div>

<!-- GAME OVER -->
<div id="gameOver">
<h1>Vex got you</h1>
<img src="gameover.jpg" width="200">
<button onclick="location.reload()">Play Again</button>
</div>

<script>
let cookie=document.getElementById("cookie");
let jar=document.getElementById("jar");
let yumiko=document.getElementById("yumiko");
let arma=document.getElementById("arma");
let counter=document.getElementById("counter");
let text=document.getElementById("text");
let vex=document.getElementById("vex");
let vexText=document.getElementById("vexText");

let cookieActive=false;
let runnerMode=false;
let vexActive=false;
let score=0;

let idols=["idol1.mov","idol2.mov","idol3.mov"];

function randomIdol(){
yumiko.src=idols[Math.floor(Math.random()*3)];
yumiko.load();
yumiko.play();
}

function startGame(){
document.getElementById("intro").style.display="none";
randomIdol();
startVexLoop();
}

/* COOKIE FOLLOW SYSTEM */
jar.onclick=()=>{
cookieActive=true;
cookie.style.display="block";
};

document.onmousemove=(e)=>{

if(vexActive){
gameOver();
return;
}

if(cookieActive && !runnerMode){
cookie.style.left=(e.pageX-35)+"px";
cookie.style.top=(e.pageY-35)+"px";

if(intersect(cookie,yumiko)){
startRun();
}
}

if(runnerMode){
yumiko.style.position="absolute";
yumiko.style.left=(e.pageX-70)+"px";
yumiko.style.top=(e.pageY-70)+"px";

if(intersect(yumiko,arma)){
success();
}
}
};

function startRun(){
runnerMode=true;
cookieActive=false;
cookie.style.display="none";

text.innerText="RUNNN";

yumiko.src="yumirunning.mov";
yumiko.load();
yumiko.play();
}

function success(){
runnerMode=false;
score++;
counter.innerText=score;

arma.src="arma3.jpg";
text.innerText="YAYYY";

setTimeout(()=>{
arma.src="arma1.jpg";
yumiko.style.position="static";
randomIdol();
text.innerText="Give Arma a cookie!";
},1500);
}

function intersect(a,b){
let r1=a.getBoundingClientRect();
let r2=b.getBoundingClientRect();
return !(r2.left>r1.right||r2.right<r1.left||r2.top>r1.bottom||r2.bottom<r1.top);
}

/* VEX SYSTEM (2 PHASE) */
function startVexLoop(){
setInterval(()=>{

/* WARNING */
text.innerText="Vex is waking up...";
text.className="text teal";

/* AFTER 5s → REAL DANGER */
setTimeout(()=>{
vex.style.display="block";
vexText.innerText="DON'T MOVE";
vexActive=true;
},5000);

/* END */
setTimeout(()=>{
vex.style.display="none";
vexActive=false;
text.innerText="Give Arma a cookie!";
text.className="text pink";
},25000);

},30000);
}

function gameOver(){
document.getElementById("gameOver").style.display="flex";
}
</script>

</body>
</html>
